<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR フォトフレーム</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        
        /* フォトフレーム：画面全体に被せる */
        #photo-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; /* カメラ映像の引き伸ばし比率に合わせる */
            z-index: 10;
            pointer-events: none; /* 下層にあるARシーンの操作を邪魔しない */
        }
        
        /* 撮影ボタン */
        #capture-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background-color: rgba(255, 255, 255, 0.9);
            border: 5px solid #ccc;
            border-radius: 50%;
            z-index: 20;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        #capture-btn:active {
            background-color: rgba(200, 200, 200, 0.9);
            transform: translateX(-50%) scale(0.95);
        }
    </style>
</head>
<body>

    <img id="photo-frame" src="frame.png" alt="Frame">

    <button id="capture-btn" aria-label="写真を撮影"></button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" 
             vr-mode-ui="enabled: false" 
             renderer="preserveDrawingBuffer: true; alpha: true;">
        
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const captureBtn = document.getElementById('capture-btn');
        const frameImg = document.getElementById('photo-frame');

        captureBtn.addEventListener('click', () => {
            // AR.jsが生成したカメラ映像（video）とA-FrameのCanvasを取得
            const video = document.querySelector('video');
            const scene = document.querySelector('a-scene');
            
            if (!video) {
                alert('カメラ映像が読み込まれていません。');
                return;
            }

            const aframeCanvas = scene.canvas;

            // 合成用の隠しキャンバスを作成
            const mergeCanvas = document.createElement('canvas');
            const ctx = mergeCanvas.getContext('2d');

            // 解像度はカメラ映像（背面ビデオ）の生のサイズに合わせる
            const width = video.videoWidth;
            const height = video.videoHeight;
            mergeCanvas.width = width;
            mergeCanvas.height = height;

            // 【1層目】カメラ映像を描画
            ctx.drawImage(video, 0, 0, width, height);

            // 【2層目】A-FrameのWebGLコンテンツ（3Dオブジェクト等）を重ねる
            if (aframeCanvas) {
                ctx.drawImage(aframeCanvas, 0, 0, width, height);
            }

            // 【3層目】フォトフレーム（PNG）を一番上に重ねる
            ctx.drawImage(frameImg, 0, 0, width, height);

            // 画像の保存（ダウンロード）処理
            try {
                const dataUrl = mergeCanvas.toDataURL('image/png');
                
                // 擬似リンクを作って自動ダウンロードを実行
                const link = document.createElement('a');
                link.download = 'webar-photo.png';
                link.href = dataUrl;
                link.click();
            } catch (err) {
                console.error(err);
                alert('画像の保存に失敗しました。Safariなどの場合は、画面をスクリーンショットするか、標準のカメラアプリをご利用ください。');
            }
        });
    </script>
</body>
</html>
